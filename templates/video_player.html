{% extends 'base.html' %}
{% block content %}
<div style="background-color: #14141b; border-radius: 12px; overflow: hidden; border: 1px solid #232330; padding: 15px;">
    <video style="width: 100%; aspect-ratio: 16/9; background-color: #000;" controls autoplay>
        <source src="{{ movie.video_url }}" type="video/mp4">
    </video>
    <h2 style="font-size: 20px; margin-top: 15px; color: white;">{{ movie.title }}</h2>
    <p style="font-size: 14px; color: #8e8e93; margin-top: 8px; margin-bottom: 15px;">{{ movie.description }}</p>
    <a href="{{ url_for('download_movie', movie_id=movie.id) }}" class="btn btn-danger">Download This Movie</a>
</div>
{% endblock %}
